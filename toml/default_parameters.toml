# How do I add a parameter?
# At the minimum, a parameter needs a parameter name, value, and type. All
# parameter names must be unique. The description attribute is optional, but it
# is recommended to add one. These parameters are loaded in ClimaLand using
# `ClimaParams.get_parameter_values`.

# TOPMODELRunoff model

[f_over]
value = 3.28
type = "float"
description = "Units are 1/m"
tag = "TOPMODELRunoff"

[R_sb]
value = 1.484e-7
type = "float"
description = "Units are m/s"
tag = "TOPMODELRunoff"

# Big leaf energy parameters

[ac_canopy]
value = 2.5e3
type = "float"
description = "Specific heat per emitting area [J/m^2/K]"
tag = "BigLeafEnergyModel"

# Weibull model

[K_sat_plant]
value = 5e-9
type = "float"
description = "Maximum Water conductivity in the above-ground plant compartments (m/s) at saturation. Units are m / s."
tag = "Weibull"

[psi_63]
value = -408.163265306122448
type = "float"
description = "The absolute water potential in xylem (or xylem water potential) at which ∼63% of maximum xylem conductance is lost (Liu, 2020). Computed by -4 / 0.0098. Holtzman's original parameter value is -4 MPa"
tag = "Weibull"

[Weibull_c]
value = 4
type = "float"
description = "Weibull parameter c, which controls shape the shape of the conductance curve (Sperry, 2016). Unitless. Holtzman's original c param value."
tag = "Weibull"

# Linear Retention Curve

[a]
value = 0.00196
type = "float"
description = "Units are 1/m. Bulk modulus of elasticity and slope of potential to volume curve. See also Corcuera, 2002, and Christoffersen, 2016. Computed by 0.2 * 0.0098."
tag = "LinearRetentionCurve"

# PrescribedSiteAreaIndex

[SAI]
value = 0.0
type = "float"
description = "The constant stem area index (SAI; m2/m2)"
tag = "PrescribedSiteAreaIndex"

[RAI]
value = 1.0
type = "float"
description = "The constant root area index (RAI; m2/m2)"
tag = "PrescribedSiteAreaIndex"

# Plant Hydraulics Parameters

[plant_nu]
value = 1.44e-4
type = "float"
description = "Porosity (m3/m3)"
tag = "PlantHydraulicsParameters"

[plant_S_s]
value = 9.8e-5
type = "float"
description = "Storativity (m3/m3). Computed by 1e-2 * 0.0098."
tag = "PlantHydraulicsParameters"

# ZenithAngleAlbedoModel parameters

[alpha_0]
value = 0.64
type = "float"
description = "Free parameter controlling the minimum snow albedo"
tag = "ZenithAngleAlbedoModel"

[delta_alpha]
value = 0.06
type = "float"
description = "Free parameter controlling the snow albedo when θs = 90∘"
tag = "ZenithAngleAlbedoModel"

[k]
value = 2.0
type = "float"
description = "Rate at which albedo drops to its minimum value with zenith angle"
tag = "ZenithAngleAlbedoModel"

[beta]
value = 0.4
type = "float"
description = "Rate governing how snow albedo changes with snow density, a proxy for grain size and liquid water content, ∈ [0,1]"
tag = "ZenithAngleAlbedoModel"

[x0]
value = 0.2
type = "float"
description = "Value of relative snow density ρ_snow/ρ_liq at which snow density begins to decrease albedo, ∈ [0,1]"
tag = "ZenithAngleAlbedoModel"

[delta_S]
value = 0.1
type = "float"
description = "Parameter to prevent dividing by zero when computing snow temperature (m)"

# Shared Canopy Parameters

[canopy_momentum_roughness_length]
value = 0.1
type = "float"
description = "Roughness length for momentum (m)"

[canopy_scalar_roughness_length]
value = 0.2
type = "float"
description = "Roughness length for scalars (m)"
