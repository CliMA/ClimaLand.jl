name: ci
on:
  push:
    branches: [main]
    tags: '*'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ci ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
          - '1.12'
        os:
          - ubuntu-latest
          - windows-latest
          # There is a concurrency limit for MacOS runners across the
          # entire organization.
          # (see https://docs.github.com/en/actions/reference/limits#job-concurrency-limits-for-github-hosted-runners)
          # To help with this, MacOS runners are only run when PRs are merged
          # into the main branch.
          - ${{ github.event_name == 'push' && 'macos-latest' || '' }}
        exclude:
          - os: ''
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
      - name: Cache Julia depot
        uses: actions/cache@v6
        with:
          # Cache Julia's depot
          path: |
            ~/.julia/packages
            ~/.julia/compiled
            ~/.julia/artifacts
            ~/.julia/scratchspaces
            ~/.julia/registries
            ~/.julia/logs
          # The cache key includes the OS, Julia version, and the project's dependencies
          key: ${{ matrix.os }}-julia-${{ matrix.version }}-${{ hashFiles('**/Project.toml', '**/Manifest.toml') }}
          # Fallback keys to use if the primary key isn't found
          restore-keys: |
            ${{ matrix.os }}-julia-${{ matrix.version }}-
            ${{ matrix.os }}-julia-
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
        with:
          file: lcov.info
      - uses: codecov/codecov-action@v7
        with:
          file: lcov.info
          token: ${{secrets.CODECOV_TOKEN}}
